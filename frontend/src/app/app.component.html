<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar__logo">
      <span class="sidebar__logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="thermo-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#818cf8"/>
              <stop offset="60%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#ef4444"/>
            </linearGradient>
          </defs>
          <path stroke="url(#thermo-grad)" d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
        </svg>
      </span>
      <span class="sidebar__logo-text">Portfolio<br>Thermometer</span>
    </div>

    <div class="sidebar__header-actions">
      <button
        class="theme-toggle"
        (click)="themeService.toggle()"
        [title]="themeService.isLight() ? 'Switch to dark mode' : 'Switch to light mode'"
      >
        <span class="sidebar__link-icon">{{ themeService.isLight() ? '🌙' : '☀️' }}</span>
        {{ themeService.isLight() ? 'Dark mode' : 'Light mode' }}
      </button>
    </div>

    <ul class="sidebar__nav">
      <li style="--nav-color: #6366f1">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="sidebar__link">
          <span class="sidebar__link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"/>
              <path d="M7 16l4-4 4 4 5-5"/>
              <circle cx="20" cy="11" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          Dashboard
        </a>
      </li>
      <li style="--nav-color: #06b6d4">
        <a routerLink="/customers" routerLinkActive="active" class="sidebar__link">
          <span class="sidebar__link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="7" r="3.5"/>
              <path d="M2.5 21v-2A4.5 4.5 0 0 1 7 14h4a4.5 4.5 0 0 1 4.5 4.5v2"/>
              <circle cx="18" cy="7" r="2.5" stroke-width="1.8"/>
              <path d="M21.5 21v-1.5a3.5 3.5 0 0 0-2.5-3.35" stroke-width="1.8"/>
            </svg>
          </span>
          Customers
        </a>
      </li>
      <li style="--nav-color: #f97316">
        <a routerLink="/risk-groups" routerLinkActive="active" class="sidebar__link">
          <span class="sidebar__link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8.5 14.5C8 12 9 9.5 12 8c-1 2.5-.5 4.5 1.5 5.5 0-1.5.5-3 2-4-.5 3 1.5 5 1.5 7.5a5 5 0 0 1-10 0c0-1.5.5-2.5 1.5-2.5"/>
            </svg>
          </span>
          Risk Groups
        </a>
      </li>
      <li style="--nav-color: #a855f7">
        <a routerLink="/test-data" routerLinkActive="active" class="sidebar__link">
          <span class="sidebar__link-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="8" ry="3"/>
              <path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/>
              <path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/>
            </svg>
          </span>
          Test Data
        </a>
      </li>
    </ul>

  </nav>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
