name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          sed -i "s|https://portfolio-thermometer-api.salmonforest-6411587f.northeurope.azurecontainerapps.io|${{ secrets.BACKEND_API_URL }}|g" src/environments/environment.ts
          npx ng build --configuration production

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Static Web Apps
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name portfolio-thermometer-frontend \
            --resource-group rg-portfolio-thermometer \
            --query "properties.apiKey" -o tsv)
          npx @azure/static-web-apps-cli@latest deploy \
            frontend/dist/portfolio-thermometer/browser \
            --deployment-token "$TOKEN"
