name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        working-directory: frontend
        run: |
          npm ci
          sed -i "s|https://portfolio-thermometer-api.salmonforest-6411587f.northeurope.azurecontainerapps.io|${{ secrets.BACKEND_API_URL }}|g" src/environments/environment.ts
          npx ng build --configuration production

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Azure Blob Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            STORAGE_KEY=$(az storage account keys list \
              --account-name portfoliothermometer \
              --resource-group rg-portfolio-thermometer \
              --query "[0].value" -o tsv)
            az storage blob upload-batch \
              --account-name portfoliothermometer \
              --account-key "$STORAGE_KEY" \
              --source frontend/dist/portfolio-thermometer/browser \
              --destination '$web' \
              --overwrite
